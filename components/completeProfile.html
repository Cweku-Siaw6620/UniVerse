<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UniVerse | Complete Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
 <div id="formContainer" class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-8 border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Final Step</h2>
        <p class="text-gray-500 mt-2">Verify your status to unlock student perks.</p>
    </div>

    <form id="profileForm" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Affiliation</label>
            <select id="affiliation" class="w-full border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none transition" required>
                <option value="">Select Affiliation</option>
                <option value="student">🎓 University Student</option>
                <option value="non-student">💼 Independent Seller</option>
            </select>
        </div>

        <div id="studentFields" class="hidden space-y-5 bg-green-50 p-5 rounded-xl border border-green-100">
            <div>
                <label class="block text-sm font-semibold text-gray-800 mb-1">Institutional Email</label>
                <input type="email" id="studentEmail" placeholder="yourname@st.ug.edu.gh" class="w-full border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-green-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-800">University</label>
                    <select id="university" class="w-full border-gray-200 rounded-lg p-2.5 mt-1">
                        <option>University of Ghana</option>
                        <option>KNUST</option>
                        <option>UCC</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-800">Graduation Date</label>
                    <input type="date" id="graduationDate" class="w-full border-gray-200 rounded-lg p-2.5 mt-1">
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition shadow-lg">
            Verify & Save
        </button>
    </form>
</div>

<div id="successState" class="hidden text-center p-10 bg-white rounded-2xl shadow-xl max-w-lg">
    <div class="text-6xl mb-4">📩</div>
    <h2 class="text-2xl font-bold text-gray-800">Check Your Email!</h2>
    <p class="text-gray-600 mt-2">We've sent a verification link to your student email. Please click it to activate your student perks.</p>
    <button onclick="window.location.href='profile.html'" class="mt-6 text-green-600 font-semibold underline">Continue to Profile</button>
</div>

<script>
  const affiliationSelect = document.getElementById("affiliation");
  const studentFields = document.getElementById("studentFields");
  const profileForm = document.getElementById("profileForm");
  const submitBtn = document.getElementById("submitBtn");

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || !user.id) {
    alert("You must be logged in");
    window.location.href = "login.html";
  }

  // Toggle fields and make them required ONLY if student is selected
  affiliationSelect.addEventListener("change", () => {
    const isStudent = affiliationSelect.value === "student";
    studentFields.classList.toggle("hidden", !isStudent);
    
    // Dynamically set required attributes so the form doesn't submit empty student data
    document.getElementById("studentEmail").required = isStudent;
    document.getElementById("graduationDate").required = isStudent;
    document.getElementById("university").required = isStudent;
  });

  profileForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    submitBtn.innerText = "Processing...";
    submitBtn.disabled = true;

    // Build payload conditionally
    const payload = {
        userId: user.id,
        affiliation: affiliationSelect.value,
        university: document.getElementById("university").value || null,
        graduationDate: document.getElementById("graduationDate").value || null,
        studentEmail: document.getElementById("studentEmail").value || null
    };

    try {
      const res = await fetch("https://universe-api-u0rj.onrender.com/api/auth/google/user/completeProfile", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok) {
          if (payload.affiliation === "student") {
              // Show the check email state
              document.getElementById("formContainer").classList.add("hidden");
              document.getElementById("successState").classList.remove("hidden");
          } else {
              // If not a student, go straight to profile
              localStorage.setItem("user", JSON.stringify(data.user));
              window.location.href = "profile.html";
          }
      } else {
          // This alert will now show the specific error from your backend
          alert("Error: " + data.message);
          submitBtn.disabled = false;
          submitBtn.innerText = "Verify & Save";
      }
    } catch (err) {
      console.error(err);
      alert("Something went wrong. Please check if your server is running.");
      submitBtn.disabled = false;
      submitBtn.innerText = "Verify & Save";
    }
  });
</script>
</body>
</html>
