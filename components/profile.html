<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../javascript/feather.min.js"></script>
  <script src="../javascript/nav.js"></script>
  <style>

    /* --- Premium Badge Styles --- */
    .verified-badge {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    
    .pending-badge {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }
    
    .expiring-badge {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .external-badge {
      background: linear-gradient(135deg, #6b7280, #4b5563);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .action-btn {
      transition: all 0.3s ease;
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    /* --- New Premium Styles --- */
    body {
      background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
    }

    .profile-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.02);
    }

    .profile-avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .profile-avatar-wrapper::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a, #22c55e);
      background-size: 300% 300%;
      animation: gradientMove 4s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .stat-item {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px 16px;
      transition: all 0.3s ease;
      border: 1px solid #f1f5f9;
    }

    .stat-item:hover {
      background: #f1f5f9;
      transform: translateY(-2px);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
    }

    .info-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1e293b;
    }

    /* Subtle decorative gradient line */
    .gold-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #e2c275, transparent);
      width: 60px;
      margin: 0 auto 16px;
    }

    .action-btn {
      border-radius: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #334155, #1e293b);
    }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .btn-outline {
      background: transparent;
      color: #1e293b;
      border: 1.5px solid #e2e8f0;
    }

    .btn-outline:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }

    .btn-danger-outline {
      background: transparent;
      color: #dc2626;
      border: 1.5px solid #fecaca;
    }

    .btn-danger-outline:hover {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    /* Status message cards */
    .status-card {
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-left: 4px solid;
    }

    .status-card .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .status-card-success {
      background: #f0fdf4;
      border-left-color: #22c55e;
    }

    .status-card-success .status-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .status-card-warning {
      background: #fffbeb;
      border-left-color: #f59e0b;
    }

    .status-card-warning .status-icon {
      background: #fef3c7;
      color: #d97706;
    }

    .status-card-danger {
      background: #fef2f2;
      border-left-color: #ef4444;
    }

    .status-card-danger .status-icon {
      background: #fee2e2;
      color: #dc2626;
    }

    .status-card-info {
      background: #f1f5f9;
      border-left-color: #64748b;
    }

    .status-card-info .status-icon {
      background: #e2e8f0;
      color: #475569;
    }

    /* Days left indicator */
    .days-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .days-indicator.urgent {
      background: #fef2f2;
      color: #dc2626;
    }

    .days-indicator.good {
      background: #f0fdf4;
      color: #16a34a;
    }

    @media (max-width: 640px) {
      .profile-card {
        padding: 20px !important;
      }
      
      .stat-item {
        padding: 10px 12px;
      }
      
      .info-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
  </style>
</head>

 <script src="../javascript/mobileView.js"></script>
<script>
feather.replace();


// Get user from localStorage
let user = null;
try {
  const userData = localStorage.getItem("user");
  user = userData ? JSON.parse(userData) : null;
} catch (err) {
  console.error("Failed to parse user:", err);
}

if (!user || !user.id) {
  alert("Please log in first");
  window.location.href = "login.html";
}

// DOM Elements
const profilePic = document.getElementById("profilePic");
const userName = document.getElementById("userName");
const userEmail = document.getElementById("userEmail");
const storeStatus = document.getElementById("storeStatus");
const affiliationStatus = document.getElementById("affiliationStatus");
const actionArea = document.getElementById("actionArea");
const verificationBadge = document.getElementById("verificationBadge");
const studentInfo = document.getElementById("studentInfo");
const universityDisplay = document.getElementById("universityDisplay");
const expiryDisplay = document.getElementById("expiryDisplay");
const daysLeftDisplay = document.getElementById("daysLeftDisplay");

// Modal elements
const idCardModal = document.getElementById("idCardModal");
const modalFrontImage = document.getElementById("modalFrontImage");
const modalBackImage = document.getElementById("modalBackImage");
const backImageContainer = document.getElementById("backImageContainer");
const closeModalBtn = document.getElementById("closeModalBtn");
const approveBtn = document.getElementById("approveBtn");
const rejectBtn = document.getElementById("rejectBtn");

let currentPendingUserId = null;
let userHasStore = null;

// Fetch user's verification status
async function fetchUserStatus() {
  try {
    const response = await fetch(`https://uni-verse-api.vercel.app/api/verification/status/${user.id}`);
    const data = await response.json();
    
    if (data.success) {
      user.affiliation = data.affiliation;
      user.isVerified = data.isVerified;
      localStorage.setItem("user", JSON.stringify(user));
      return data;
    }
  } catch (error) {
    console.error("Error fetching status:", error);
  }
  return null;
}

// Update profile display
async function updateProfileDisplay() {
  profilePic.src = user.picture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name || 'User') + '&background=22c55e&color=fff&size=80';
  userName.textContent = user.name || 'User';
  userEmail.textContent = user.email || '';
  
  try {
    const storeRes = await fetch(`https://uni-verse-api.vercel.app/api/stores/${user.id}/exists`);
    const storeData = await storeRes.json();
    userHasStore = Boolean(storeData.hasStore);
    storeStatus.innerHTML = storeData.hasStore ? `🛍️ ${storeData.storeName}` : '❌ No Store';
  } catch (err) {
    userHasStore = null;
    storeStatus.innerHTML = 'Error loading';
  }
  
  const status = await fetchUserStatus();
  
  if (status) {
    const affiliation = status.affiliation;
    const isVerified = status.isVerified;
    
    if (affiliation === 'student_verified' && isVerified) {
      verificationBadge.innerHTML = '<span class="verified-badge">✅ Verified Student</span>';
      affiliationStatus.innerHTML = '🎓 Verified Student';
      
      if (status.expiryStatus && status.expiryStatus.daysLeft) {
        studentInfo.classList.remove('hidden');
        universityDisplay.textContent = status.university || 'Not specified';
        
        const expiryDate = new Date(status.expiryStatus.expiresAt);
        expiryDisplay.textContent = expiryDate.toLocaleDateString();
        
        if (status.expiryStatus.daysLeft <= 30) {
          daysLeftDisplay.innerHTML = `<span class="days-indicator urgent"><i class="fas fa-exclamation-triangle"></i> ID expires in ${status.expiryStatus.daysLeft} days</span>`;
        } else {
          daysLeftDisplay.innerHTML = `<span class="days-indicator good"><i class="fas fa-check-circle"></i> Valid for ${status.expiryStatus.daysLeft} more days</span>`;
        }
      }
      
    } else if (affiliation === 'student_pending') {
      verificationBadge.innerHTML = '<span class="pending-badge">⏳ Pending Review</span>';
      affiliationStatus.innerHTML = '⏳ Student ID Under Review';
      studentInfo.classList.remove('hidden');
      universityDisplay.textContent = status.university || 'Not specified';
      daysLeftDisplay.innerHTML = '<span class="days-indicator" style="background:#fef3c7;color:#d97706;"><i class="fas fa-clock"></i> Awaiting admin approval (24-48 hours)</span>';
      
    } else if (status.idCardStatus === 'rejected') {
      verificationBadge.innerHTML = '<span class="expiring-badge">❌ Verification Failed</span>';
      affiliationStatus.innerHTML = '❌ ID Card Rejected';
      studentInfo.classList.remove('hidden');
      daysLeftDisplay.innerHTML = `<span class="days-indicator urgent"><i class="fas fa-times-circle"></i> Reason: ${status.rejectionReason || 'Invalid ID card'}</span>`;
      
    } else {
      verificationBadge.innerHTML = '<span class="external-badge">👤 External Affiliate</span>';
      affiliationStatus.innerHTML = '👤 External Affiliate';
      studentInfo.classList.add('hidden');
    }
  }
}

// Load action buttons based on status
async function loadActionButtons() {
  const status = await fetchUserStatus();
  const affiliation = status?.affiliation || user.affiliation;
  const isVerified = status?.isVerified || user.isVerified;
  const idCardStatus = status?.idCardStatus;
  const hasStore = userHasStore === true;
  
  actionArea.innerHTML = "";
  
  // CASE 1: Verified Student
  if (affiliation === 'student_verified' && isVerified) {
    actionArea.innerHTML = `
      <div class="status-card status-card-success">
        <div class="status-icon"><i class="fas fa-check-circle"></i></div>
        <div>
          <p class="font-medium text-green-700 text-sm">You are a verified student!</p>
          <p class="text-green-600 text-xs">You have access to student perks</p>
        </div>
      </div>
      ${hasStore ? '' : `
      <button id="createStoreBtn" class="w-full action-btn btn-primary py-3.5 text-sm">
        🛍️ Create a Store
      </button>
      `}
    `;
    
    document.getElementById("createStoreBtn")?.addEventListener("click", () => {
      window.location.href = "createStore.html";
    });
    
    document.getElementById("myStoreBtn")?.addEventListener("click", async () => {
      try {
        const storeRes = await fetch(`https://uni-verse-api.vercel.app/api/stores/${user.id}`);
        const store = await storeRes.json();
        if (store && store._id) {
          window.location.href = "dashboard.html";
        } else {
          alert("You don't have a store yet. Click 'Create a Store' to get started!");
        }
      } catch (err) {
        alert("Error checking store status");
      }
    });
    return;
  }
  
  // CASE 2: Pending Review
  if (affiliation === 'student_pending' && idCardStatus === 'pending') {
    actionArea.innerHTML = `
      <div class="status-card status-card-warning">
        <div class="status-icon"><i class="fas fa-clock"></i></div>
        <div>
          <p class="font-medium text-yellow-700 text-sm">Verification in Progress</p>
          <p class="text-yellow-600 text-xs">Your ID card is being reviewed by our team</p>
        </div>
      </div>
      <button id="viewIdCardBtn" class="w-full action-btn btn-primary py-3.5 text-sm">
        🪪 View My Submitted ID Card
      </button>
      <button id="resubmitBtn" class="w-full action-btn btn-outline py-3.5 text-sm">
        📤 Submit New ID Card
      </button>
    `;
    
    document.getElementById("viewIdCardBtn")?.addEventListener("click", () => {
      if (status?.idCardImages?.front) {
        modalFrontImage.src = status.idCardImages.front;
        if (status.idCardImages.back) {
          modalBackImage.src = status.idCardImages.back;
          backImageContainer.classList.remove("hidden");
        } else {
          backImageContainer.classList.add("hidden");
        }
        approveBtn.style.display = "none";
        rejectBtn.style.display = "none";
        idCardModal.classList.remove("hidden");
        idCardModal.classList.add("flex");
      } else {
        alert("No ID card image found. Please resubmit.");
      }
    });
    
    document.getElementById("resubmitBtn")?.addEventListener("click", () => {
      window.location.href = "completeProfile.html";
    });
    return;
  }
  
  // CASE 3: Rejected ID card
  if (idCardStatus === 'rejected') {
    actionArea.innerHTML = `
      <div class="status-card status-card-danger">
        <div class="status-icon"><i class="fas fa-times-circle"></i></div>
        <div>
          <p class="font-medium text-red-700 text-sm">Verification Failed</p>
          <p class="text-red-600 text-xs">${status?.rejectionReason || 'Your ID card could not be verified'}</p>
        </div>
      </div>
      <button id="resubmitBtn" class="w-full action-btn btn-primary py-3.5 text-sm">
        📤 Submit New ID Card
      </button>
      <button id="becomeExternalBtn" class="w-full action-btn btn-outline py-3.5 text-sm">
        👤 Continue as External Affiliate
      </button>
    `;
    
    document.getElementById("resubmitBtn")?.addEventListener("click", () => {
      window.location.href = "completeProfile.html";
    });
    
    document.getElementById("becomeExternalBtn")?.addEventListener("click", async () => {
      try {
        const response = await fetch("https://uni-verse-api.vercel.app/api/auth/google/user/completeProfile", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: user.id,
            affiliation: "external"
          })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.reload();
        } else {
          alert(data.message || "Failed to update profile");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong");
      }
    });
    return;
  }
  
  // CASE 4: External Affiliate
  actionArea.innerHTML = `
    <div class="status-card status-card-info">
      <div class="status-icon"><i class="fas fa-user"></i></div>
      <div>
        <p class="font-medium text-gray-700 text-sm">External Affiliate Account</p>
        <p class="text-gray-500 text-xs">You can browse and purchase items</p>
      </div>
    </div>
    <button id="verifyStudentBtn" class="w-full action-btn btn-success py-3.5 text-sm">
      🎓 Verify as Student
    </button>
    ${hasStore ? '' : `
    <button id="createStoreBtn" class="w-full action-btn btn-primary py-3.5 text-sm">
      🛍️ Create a Store
    </button>
    `}
  `;
  
  document.getElementById("verifyStudentBtn")?.addEventListener("click", () => {
    window.location.href = "completeProfile.html";
  });
  
  document.getElementById("createStoreBtn")?.addEventListener("click", () => {
    window.location.href = "createStore.html";
  });
}

// Close modal
closeModalBtn.addEventListener("click", () => {
  idCardModal.classList.remove("flex");
  idCardModal.classList.add("hidden");
});

idCardModal.addEventListener("click", (e) => {
  if (e.target === idCardModal) {
    idCardModal.classList.remove("flex");
    idCardModal.classList.add("hidden");
  }
});

// Approve button
approveBtn.addEventListener("click", async () => {
  if (!currentPendingUserId) return;
  
  try {
    const response = await fetch("https://uni-verse-api.vercel.app/api/verification/admin/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: currentPendingUserId })
    });
    
    const data = await response.json();
    
    if (data.success) {
      alert("Student approved successfully!");
      idCardModal.classList.remove("flex");
      idCardModal.classList.add("hidden");
      window.location.reload();
    } else {
      alert(data.message || "Failed to approve");
    }
  } catch (error) {
    console.error("Approval error:", error);
    alert("Something went wrong");
  }
});

// Reject button
rejectBtn.addEventListener("click", async () => {
  if (!currentPendingUserId) return;
  
  const reason = prompt("Please provide a reason for rejection:");
  if (!reason) return;
  
  try {
    const response = await fetch("https://uni-verse-api.vercel.app/api/verification/admin/reject", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        userId: currentPendingUserId,
        reason: reason 
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      alert("Student verification rejected!");
      idCardModal.classList.remove("flex");
      idCardModal.classList.add("hidden");
      window.location.reload();
    } else {
      alert(data.message || "Failed to reject");
    }
  } catch (error) {
    console.error("Rejection error:", error);
    alert("Something went wrong");
  }
});

// Initialize page
async function init() {
  await updateProfileDisplay();
  await loadActionButtons();
}

init();

if (window.location.search.includes('verified=true')) {
  alert("✅ Email verified successfully! Your student status has been confirmed.");
  window.history.replaceState({}, document.title, window.location.pathname);
}
</script>
</body>
